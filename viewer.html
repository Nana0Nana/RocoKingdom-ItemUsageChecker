<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>流水筛选可视化 - 高级数据终端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #f5f1e8;
      --bg-gradient: radial-gradient(circle at 10% 20%, rgba(179, 86, 47, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(38, 112, 111, 0.06) 0%, transparent 40%), linear-gradient(180deg, #f7f3ec 0%, #f2ede4 100%);
      
      --glass-bg: rgba(255, 250, 240, 0.7);
      --glass-border: rgba(220, 205, 184, 0.6);
      --glass-shadow: 0 8px 32px rgba(67, 41, 12, 0.05);
      
      --text-main: #2f2419;
      --text-muted: #7a6a57;
      
      --primary: #b3562f;
      --primary-dark: #9c4826;
      --secondary: #26706f;
      
      --good: #2b8a57;
      --good-glow: rgba(43, 138, 87, 0.2);
      --bad: #c4513d;
      --bad-glow: rgba(196, 81, 61, 0.2);
      
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 8px;
      
      --anim: 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Outfit', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      color: var(--text-main);
      background: var(--bg-light);
      background-image: var(--bg-gradient);
      background-attachment: fixed;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

     /* Ambient glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.6;
      animation: float 25s infinite ease-in-out alternate;
    }
    .orb-1 { width: 50vw; height: 50vw; background: rgba(179, 86, 47, 0.1); top: -25vw; left: -25vw; }
    .orb-2 { width: 40vw; height: 40vw; background: rgba(38, 112, 111, 0.1); bottom: -20vw; right: -20vw; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 60px) scale(1.05); }
    }

    .wrap {
      width: min(1440px, calc(100% - 48px));
      margin: 40px auto 60px;
    }

    /* Glass Panels */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--glass-shadow);
      padding: 32px;
      transition: border-color var(--anim), box-shadow var(--anim);
    }
    .glass-panel:hover {
      border-color: rgba(179, 86, 47, 0.2);
      box-shadow: 0 12px 40px rgba(67, 41, 12, 0.08);
    }

    /* Hero */
    .hero {
      position: relative;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.1;
      letter-spacing: -1px;
      font-weight: 800;
      color: #241b12;
    }
    .sub {
      color: var(--text-muted);
      margin: 0;
      font-size: 16px;
      font-weight: 500;
      max-width: 800px;
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    /* Typography inside panels */
    h2 {
      margin: 0 0 20px;
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-main);
    }
    h2::before {
      content: '';
      display: block;
      width: 4px;
      height: 20px;
      background: var(--primary);
      border-radius: 4px;
    }

    /* Form Controls */
    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      letter-spacing: 0.5px;
    }

    input, select, button {
      font: inherit;
      outline: none;
    }

    input[type="text"], input[type="datetime-local"], select {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(255, 253, 248, 0.9);
      color: var(--text-main);
      transition: all var(--anim);
      box-shadow: inset 0 2px 4px rgba(67, 41, 12, 0.02);
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(179, 86, 47, 0.15);
      background: #fff;
    }
    select option {
      background: #fff;
      color: var(--text-main);
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button, .file-button {
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all var(--anim);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 10px rgba(179, 86, 47, 0.25);
    }
    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(179, 86, 47, 0.35);
    }

    .btn-secondary {
      background: #efe4d2;
      color: var(--text-main);
      box-shadow: 0 2px 6px rgba(67, 41, 12, 0.05);
    }
    .btn-secondary:hover {
      background: #e6d8c3;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(67, 41, 12, 0.08);
    }
    
    .file-input-wrapper { display: inline-block; }
    input[type="file"] { display: none; }

    /* Layout Utilities */
    .grid { display: grid; gap: 16px; }
    .grid.two { grid-template-columns: 1fr 1fr; }
    .stack { display: flex; flex-direction: column; gap: 24px; }
    
    .section-line {
      height: 1px;
      background: linear-gradient(90deg, rgba(220, 205, 184, 0), rgba(220, 205, 184, 0.8), rgba(220, 205, 184, 0));
      margin: 8px 0;
    }

    /* Tooltip / Status */
    .status {
      font-size: 14px;
      color: var(--primary-dark);
      background: rgba(179, 86, 47, 0.06);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border-left: 3px solid var(--primary);
    }

    /* Summary Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(253, 248, 240, 0.98));
      border: 1px solid var(--glass-border);
      padding: 24px;
      border-radius: var(--radius-md);
      position: relative;
      overflow: hidden;
      transition: all var(--anim);
      box-shadow: 0 2px 8px rgba(67, 41, 12, 0.03);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(67, 41, 12, 0.08);
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px; height: 100%;
    }
    .stat-card.total::before { background: var(--text-muted); }
    .stat-card.good::before { background: var(--good); }
    .stat-card.bad::before { background: var(--bad); }
    .stat-card.net::before { background: var(--primary); }

    .stat-label {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .stat-val {
      font-size: clamp(28px, 3vw, 40px);
      font-weight: 800;
      line-height: 1;
      font-family: 'Outfit', sans-serif;
      color: var(--text-main);
    }
    .stat-val.good-text { color: var(--good); }
    .stat-val.bad-text { color: var(--bad); }
    .stat-val.primary-text { color: var(--primary); }

    /* Item Cards (Selectable) */
    .filter-block {
      background: rgba(255, 253, 248, 0.6);
      border-radius: var(--radius-md);
      padding: 20px;
      border: 1px solid rgba(220, 205, 184, 0.5);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5);
    }
    .filter-block h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-muted);
      margin: 0 0 16px;
    }

    .item-card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-height: 480px;
      overflow-y: auto;
      padding-right: 8px;
    }
    .item-card-grid::-webkit-scrollbar { width: 6px; }
    .item-card-grid::-webkit-scrollbar-track { background: transparent; }
    .item-card-grid::-webkit-scrollbar-thumb { background: rgba(122, 106, 87, 0.2); border-radius: 3px; }
    .item-card-grid::-webkit-scrollbar-thumb:hover { background: rgba(122, 106, 87, 0.4); }

    .item-card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(246, 235, 220, 0.98));
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      color: var(--text-main);
      transition: all var(--anim);
      width: 100%;
      box-shadow: 0 2px 6px rgba(67, 41, 12, 0.02);
    }
    .item-card:hover {
      background: #fff;
      border-color: rgba(179, 86, 47, 0.4);
      transform: translateX(4px);
      box-shadow: 0 6px 16px rgba(67, 41, 12, 0.06);
    }
    .item-card.active {
      background: linear-gradient(180deg, rgba(179, 86, 47, 0.96), rgba(151, 64, 29, 0.98));
      color: #fff7f2;
      border-color: rgba(179, 86, 47, 0.95);
      box-shadow: 0 6px 16px rgba(179, 86, 47, 0.25);
    }
    .item-card .title { font-weight: 700; font-size: 15px; }
    .item-card .desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; }
    .item-card.active .desc, .item-card.active small { color: rgba(255, 247, 242, 0.86); }
    .item-card .meta { margin-top: 8px; font-size: 18px; font-weight: 700; color: var(--primary); font-family: 'Outfit'; display: flex; align-items: baseline; justify-content: space-between;}
    .item-card.active .meta { color: #fff; }
    .item-card .meta small { font-size: 12px; color: var(--text-muted); font-weight: 600; font-family: sans-serif; }
    .item-card.active .meta small { color: rgba(255, 255, 255, 0.85); }

    /* Beautiful Charts using CSS */
    .bars-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .bar-row {
      background: rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      border: 1px solid rgba(220, 205, 184, 0.6);
      transition: all var(--anim);
    }
    .bar-row:hover {
      background: #fff;
      border-color: rgba(220, 205, 184, 0.9);
      box-shadow: 0 4px 12px rgba(67, 41, 12, 0.03);
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .bar-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }
    .bar-stats {
      display: flex;
      gap: 8px;
    }
    .stat-pill {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
    }
    .stat-pill.good { background: rgba(43, 138, 87, 0.12); color: var(--good); }
    .stat-pill.bad { background: rgba(196, 81, 61, 0.12); color: var(--bad); }
    .stat-pill.neutral { background: #efe4d2; color: var(--text-main); }

    .bar-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    
    .track-wrapper { position: relative; height: 12px; }
    .track {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(67, 41, 12, 0.08); /* slightly darker empty track for contrast */
      border-radius: 6px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(67, 41, 12, 0.08);
    }
    .fill {
      height: 100%;
      border-radius: 6px;
      transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
    }
    .fill::after {
      content: '';
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.2) 100%);
      border-radius: 6px;
    }
    .fill.good {
      background: linear-gradient(90deg, #2b8a57, #63b97d);
    }
    .fill.bad {
      background: linear-gradient(90deg, #c4513d, #dd8a6f);
    }

    /* Daily Trend Visualization */
    .day-chart-wrapper {
      background: rgba(255, 255, 255, 0.4);
      border-radius: var(--radius-md);
      border: 1px solid rgba(220, 205, 184, 0.6);
      padding: 0 16px;
      overflow-x: auto;
    }
    .day-chart-wrapper::-webkit-scrollbar { height: 6px; }
    .day-chart-wrapper::-webkit-scrollbar-track { background: transparent; }
    .day-chart-wrapper::-webkit-scrollbar-thumb { background: rgba(122, 106, 87, 0.2); border-radius: 3px; }
    .day-chart-wrapper::-webkit-scrollbar-thumb:hover { background: rgba(122, 106, 87, 0.4); }

    .day-trend-chart {
      display: flex;
      height: 280px;
      padding-top: 20px;
      align-items: stretch;
      gap: 2px;
      position: relative;
      min-width: 100%;
    }
    .day-col {
      flex: 1;
      min-width: 36px;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: crosshair;
      z-index: 1;
    }
    .day-col:hover {
      background: rgba(179, 86, 47, 0.05);
    }
    .day-half {
      flex: 1;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .day-half.up { align-items: flex-end; padding-bottom: 2px; }
    .day-half.down { align-items: flex-start; padding-top: 2px; border-top: 1px solid rgba(220, 205, 184, 0.8); }

    .col-fill-up {
      width: 16px;
      background: linear-gradient(0deg, #2b8a57, #63b97d);
      border-radius: 4px 4px 0 0;
      transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .col-fill-up:hover { background: #63b97d; }

    .col-fill-down {
      width: 16px;
      background: linear-gradient(180deg, #c4513d, #dd8a6f);
      border-radius: 0 0 4px 4px;
      transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .col-fill-down:hover { background: #dd8a6f; }

    .day-label {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding-top: 6px;
      height: 24px;
      white-space: nowrap;
    }

    .day-tooltip {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 1px solid var(--glass-border);
      box-shadow: 0 4px 16px rgba(67, 41, 12, 0.1);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-main);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s;
      z-index: 100;
      white-space: nowrap;
    }
    .day-col:hover .day-tooltip {
      opacity: 1;
    }

    .dt-date {
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 6px;
      font-size: 14px;
    }
    .dt-stat {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      line-height: 1.5;
    }
    .dt-stat span { font-weight: 600; }

    @media (max-width: 1280px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
      .content { order: 1; }
      .item-card-grid {
         grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
         max-height: 500px;
      }
    }
    @media (max-width: 768px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .bar-pair { grid-template-columns: 1fr; gap: 8px; }
      .bar-meta { flex-direction: column; align-items: flex-start; gap: 8px; }
    }
  </style>
</head>

<body>
  <!-- Ambient Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="wrap">
    <header class="glass-panel hero">
      <h1>流水筛选可视化</h1>
      <p class="sub">查看固定时间段、固定道具种类、增减类型和原因过滤，并把结果用汇总卡片、排行榜和明细表现代化展示。</p>
    </header>

    <div class="summary-grid">
      <div class="stat-card total glass-panel">
        <div class="stat-label">符合条件记录数</div>
        <div id="totalRows" class="stat-val">0</div>
      </div>
      <div class="stat-card good glass-panel">
        <div class="stat-label">总增加</div>
        <div id="totalIncrease" class="stat-val good-text">0</div>
      </div>
      <div class="stat-card bad glass-panel">
        <div class="stat-label">总减少</div>
        <div id="totalDecrease" class="stat-val bad-text">0</div>
      </div>
      <div class="stat-card net glass-panel">
        <div class="stat-label">净变化</div>
        <div id="netChange" class="stat-val primary-text">0</div>
      </div>
    </div>

    <div class="layout">
      
      <aside class="sidebar stack">
        <section class="glass-panel">
          <h2>数据源</h2>
          <div class="actions">
            <button id="loadDefaultBtn" class="btn-primary" type="button">加载同目录 JSON</button>
            <div class="file-input-wrapper">
              <label class="btn-secondary file-button" for="fileInput" style="margin: 0; padding: 12px 24px;">手动选择 JSON</label>
              <input id="fileInput" type="file" accept=".json,application/json">
            </div>
          </div>
          <div id="status" class="status" style="margin-top: 16px;">等待加载数据...</div>
        </section>

        <section class="glass-panel">
          <h2>过滤条件</h2>
          <div class="stack">
            <div class="filter-block">
              <h3>时间范围</h3>
              <div class="grid">
                <label>开始时间
                  <input id="startTime" type="datetime-local" value="">
                </label>
                <label>结束时间
                  <input id="endTime" type="datetime-local" value="">
                </label>
              </div>
            </div>

            <div class="filter-block">
              <h3>名称过滤</h3>
              <div style="margin-bottom: 12px;">
                <button id="filterBallsBtn" class="btn-secondary" type="button" style="padding: 6px 12px; font-size: 12px; border-radius: 6px;">快速筛选：只看球</button>
              </div>
              <label>道具名称关键词
                <input id="keywordInput" type="text" value="" placeholder="例如：球 / 高级咕噜球">
              </label>
            </div>

            <div class="filter-block">
              <h3>附加筛选</h3>
              <div class="grid two">
                <label>增减类型
                  <select id="actionSelect">
                    <option value="">全部</option>
                    <option value="增加">只看增加</option>
                    <option value="减少">只看减少</option>
                  </select>
                </label>
                <label>原因
                  <select id="reasonSelect">
                    <option value="">全部</option>
                  </select>
                </label>
              </div>
            </div>

            <div class="filter-block">
               <h3>道具卡片选择</h3>
               <label style="margin-bottom: 12px;">精确道具
                <select id="itemSelect">
                  <option value="">全部匹配道具</option>
                </select>
               </label>
               <div id="itemCardGrid" class="item-card-grid"></div>
            </div>

            <div class="actions">
              <button id="applyBtn" class="btn-primary" type="button" style="flex:1;">应用筛选</button>
              <button id="presetBtn" class="btn-secondary" type="button" style="flex:1;">重置条件</button>
            </div>
          </div>
        </section>
      </aside>

      <main class="content stack">
        <section class="glass-panel">
          <h2>按道具汇总 (Top 12)</h2>
          <div id="itemBars" class="bars-container"></div>
        </section>

        <section class="glass-panel">
          <h2>按日期汇总</h2>
          <div id="dayBars" class="bars-container"></div>
        </section>

        <section class="glass-panel">
          <h2>按原因汇总 (Top 12)</h2>
          <div id="reasonBars" class="bars-container"></div>
        </section>
      </main>

    </div>
  </div>

  <script>
    const state = {
      rows: [],
      filtered: [],
      selectedItems: [],
    };

    const AUTO_LOAD_INTERVAL_MS = 3000;
    let autoLoadTimer = null;

    const BALL_INFO = {
      "普通咕噜球": "最普通的咕噜球，基础捕捉球。",
      "高级咕噜球": "常用的进阶捕捉球，捕捉概率更高。",
      "可可果球": "活动获取的特殊球，描述中强调捕捉概率较高。",
      "爱茉咕噜球": "只能在花神和传说挑战中使用的特殊球。",
      "美妙球": "更适合草系、普通系精灵的捕捉。",
      "调温球": "更适合冰系、火系精灵的捕捉。",
      "变幻球": "更适合水系、机械系精灵的捕捉。",
      "冰凌球": "更适合风系、天使明的精灵捕捉。",
      "光合球": "更适合草系、光系精灵的捕捉。",
      "沙沙球": "更适合地系、虫系精灵的捕捉。",
      "好战球": "更适合龙系、武系精灵的捕捉。",
      "幽梦球": "更适合暗系、超系精灵的捕捉。",
      "网兜球": "更适合水系、飞系精灵的捕捉。",
      "绝缘球": "更适合电系、地系精灵的捕捉。",
      "水球球": "在雨天使用时会额外提高捕捉率。",
      "捕光球": "赛季限定咕噜球，强调 100% 捕捉精灵。",
      "国王球": "强调 100% 捕捉精灵，但携带后不能天胶。",
      "棱镜球": "强调 100% 捕捉精灵，描述中提到需先为天球。",
      "织梦绽颜球": "赛季限定咕噜球，描述中强调可焕化为限定校彩。",
    };

    const els = {
      loadDefaultBtn: document.getElementById("loadDefaultBtn"),
      fileInput: document.getElementById("fileInput"),
      applyBtn: document.getElementById("applyBtn"),
      presetBtn: document.getElementById("presetBtn"),
      status: document.getElementById("status"),
      startTime: document.getElementById("startTime"),
      endTime: document.getElementById("endTime"),
      keywordInput: document.getElementById("keywordInput"),
      itemSelect: document.getElementById("itemSelect"),
      actionSelect: document.getElementById("actionSelect"),
      reasonSelect: document.getElementById("reasonSelect"),
      itemCardGrid: document.getElementById("itemCardGrid"),
      totalRows: document.getElementById("totalRows"),
      totalIncrease: document.getElementById("totalIncrease"),
      totalDecrease: document.getElementById("totalDecrease"),
      netChange: document.getElementById("netChange"),
      itemBars: document.getElementById("itemBars"),
      dayBars: document.getElementById("dayBars"),
      reasonBars: document.getElementById("reasonBars"),
    };

    function setStatus(text) {
      els.status.innerHTML = `<strong>Status:</strong> ${text}`;
    }

    function parseCount(value) {
      const num = Number.parseInt(String(value ?? "").trim(), 10);
      return Number.isFinite(num) ? num : 0;
    }

    function parseDateTime(value) {
      return new Date(value.replace(" ", "T"));
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN").format(value);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getBallDescription(name) {
      return BALL_INFO[name] || "点击筛选查看该道具在所选时间范围内的增加、减少和净变化。";
    }

    function resetPreset() {
      els.startTime.value = "";
      els.endTime.value = "";
      els.keywordInput.value = "";
      els.actionSelect.value = "";
      els.reasonSelect.value = "";
      els.itemSelect.value = "";
      state.selectedItems = [];
    }

    function normalizeRows(rows) {
      return rows
        .filter(row => row && row.dtEventTime && row.ItemName)
        .map(row => ({
          ...row,
          _time: parseDateTime(row.dtEventTime),
          _count: parseCount(row.iCount),
          _after: parseCount(row.AfterCount),
        }))
        .sort((a, b) => b._time - a._time);
    }

    function stopAutoLoadRetry() {
      if (autoLoadTimer !== null) {
        clearTimeout(autoLoadTimer);
        autoLoadTimer = null;
      }
    }

    function scheduleAutoLoadRetry() {
      if (autoLoadTimer !== null || state.rows.length) {
        return;
      }
      autoLoadTimer = window.setTimeout(() => {
        autoLoadTimer = null;
        loadDefaultFile(true);
      }, AUTO_LOAD_INTERVAL_MS);
    }

    async function loadDefaultFile(silentRetry = false) {
      if (!silentRetry) {
        setStatus("正在尝试读取同目录 full_list.json ...");
      }
      try {
        const response = await fetch("./full_list.json?ts=" + Date.now());
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const data = await response.json();
        hydrateData(data, "已加载同目录 full_list.json");
      } catch (error) {
        setStatus("自动读取失败，请改用“手动选择 JSON”。原因：" + error.message);
        scheduleAutoLoadRetry();
      }
    }

    function hydrateData(data, message) {
      const rows = Array.isArray(data) ? data : data.rows;
      state.rows = normalizeRows(Array.isArray(rows) ? rows : []);
      stopAutoLoadRetry();
      populateFilterOptions();
      applyFilters();
      setStatus(message + "，共 <span>" + formatNumber(state.rows.length) + "</span> 条记录。");
    }

    function populateFilterOptions() {
      const keyword = els.keywordInput.value.trim();
      const itemNames = [...new Set(
        state.rows
          .map(row => row.ItemName)
          .filter(name => {
            if (!keyword) return true;
            if (!name.includes(keyword)) return false;
            // 排除并非功能性捕捉球的伪球道具
            if (keyword === "球" && (name.includes("星球仪") || name.includes("毛线球") || name.includes("水球") || name.includes("雪球") || name.includes("气球"))) return false;
            return true;
          })
      )].sort((a, b) => a.localeCompare(b, "zh-CN"));

      const reasons = [...new Set(state.rows.map(row => row.ReasonName || "未注明"))]
        .sort((a, b) => a.localeCompare(b, "zh-CN"));

      const itemCounts = new Map();
      for (const row of state.rows) {
        if (!itemNames.includes(row.ItemName)) continue;
        itemCounts.set(row.ItemName, (itemCounts.get(row.ItemName) || 0) + 1);
      }

      state.selectedItems = state.selectedItems.filter(name => itemNames.includes(name));
      const currentItem = state.selectedItems.length === 1 ? state.selectedItems[0] : "";
      els.itemSelect.innerHTML = '<option value="">全部匹配道具</option>' +
        itemNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
      els.itemSelect.value = currentItem;

      renderItemCards(itemNames, itemCounts);

      const currentReason = els.reasonSelect.value;
      els.reasonSelect.innerHTML = '<option value="">全部</option>' +
        reasons.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
      if (reasons.includes(currentReason)) {
        els.reasonSelect.value = currentReason;
      }
    }

    function applyFilters() {
      const start = els.startTime.value ? new Date(els.startTime.value) : null;
      const end = els.endTime.value ? new Date(els.endTime.value) : null;
      const keyword = els.keywordInput.value.trim();
      const selectedItems = new Set(state.selectedItems);
      const action = els.actionSelect.value;
      const reason = els.reasonSelect.value;

      state.filtered = state.rows.filter(row => {
        if (start && row._time < start) return false;
        if (end && row._time > end) return false;
        if (keyword) {
          if (!row.ItemName.includes(keyword)) return false;
          if (keyword === "球" && (row.ItemName.includes("星球仪") || row.ItemName.includes("毛线球") || row.ItemName.includes("水球") || row.ItemName.includes("雪球") || row.ItemName.includes("气球"))) return false;
        }
        if (selectedItems.size && !selectedItems.has(row.ItemName)) return false;
        if (action && row.AddOrReduce !== action) return false;
        if (reason && (row.ReasonName || "未注明") !== reason) return false;
        return true;
      });

      renderSummary(state.filtered);
      renderBars(state.filtered);
      syncItemCardActiveState();
    }

    function renderItemCards(itemNames, itemCounts) {
      const selectedItems = new Set(state.selectedItems);
      const cards = [
        `
          <button class="item-card ${selectedItems.size ? "" : "active"}" type="button" data-item="">
            <span class="title">全部匹配道具</span>
            <span class="desc">同时查看当前关键词下所有道具的增减变化，适合先看整体再细分。</span>
            <span class="meta">${formatNumber(itemNames.length)} <small>个道具${selectedItems.size ? " (点击清空)" : ""}</small></span>
          </button>
        `,
        ...itemNames.map(name => `
          <button class="item-card ${selectedItems.has(name) ? "active" : ""}" type="button" data-item="${escapeHtml(name)}">
            <span class="title">${escapeHtml(name)}</span>
            <span class="desc">${escapeHtml(getBallDescription(name))}</span>
            <span class="meta">${formatNumber(itemCounts.get(name) || 0)} <small>条记录</small></span>
          </button>
        `)
      ];
      els.itemCardGrid.innerHTML = cards.join("");
    }

    function syncItemCardActiveState() {
      const selectedItems = new Set(state.selectedItems);
      for (const card of els.itemCardGrid.querySelectorAll(".item-card")) {
        const item = card.dataset.item || "";
        const active = item ? selectedItems.has(item) : selectedItems.size === 0;
        card.classList.toggle("active", active);
      }
    }

    function renderSummary(rows) {
      const increase = rows
        .filter(row => row.AddOrReduce === "增加")
        .reduce((sum, row) => sum + row._count, 0);
      const decrease = rows
        .filter(row => row.AddOrReduce === "减少")
        .reduce((sum, row) => sum + row._count, 0);
      const net = increase - decrease;

      els.totalRows.textContent = formatNumber(rows.length);
      els.totalIncrease.textContent = formatNumber(increase);
      els.totalDecrease.textContent = formatNumber(decrease);
      els.netChange.textContent = (net > 0 ? "+" : "") + formatNumber(net);
      els.netChange.className = "stat-val " + (net > 0 ? "good-text" : net < 0 ? "bad-text" : "primary-text");
    }

    function summarizeBy(rows, keyFn) {
      const map = new Map();
      for (const row of rows) {
        const key = keyFn(row);
        const entry = map.get(key) || { name: key, increase: 0, decrease: 0, rows: 0 };
        entry.rows += 1;
        if (row.AddOrReduce === "增加") entry.increase += row._count;
        if (row.AddOrReduce === "减少") entry.decrease += row._count;
        map.set(key, entry);
      }
      return [...map.values()];
    }

    function renderBarGroup(container, records) {
      if (!records.length) {
        container.innerHTML = '<div style="color:var(--text-muted); font-size:14px; padding:20px; text-align:center;">当前过滤条件下没有数据。</div>';
        return;
      }

      const maxIncrease = Math.max(...records.map(item => item.increase), 1);
      const maxDecrease = Math.max(...records.map(item => item.decrease), 1);
      const globalMax = Math.max(maxIncrease, maxDecrease);
      container.innerHTML = records.map(item => {
        const increaseWidth = (item.increase / globalMax) * 100;
        const decreaseWidth = (item.decrease / globalMax) * 100;
        const net = item.increase - item.decrease;
        return `
          <div class="bar-row">
            <div class="bar-meta">
              <strong class="bar-name">${escapeHtml(item.name)}</strong>
              <div class="bar-stats">
                  <span class="stat-pill good">↑ ${formatNumber(item.increase)}</span>
                  <span class="stat-pill bad">↓ ${formatNumber(item.decrease)}</span>
                  <span class="stat-pill neutral">净 ${net > 0 ? "+" : ""}${formatNumber(net)}</span>
              </div>
            </div>
            <div class="bar-pair">
              <div class="track-wrapper">
                <div class="track">
                  <div class="fill good" style="width:${increaseWidth}%;"></div>
                </div>
              </div>
              <div class="track-wrapper">
                 <div class="track">
                  <div class="fill bad" style="width:${decreaseWidth}%;"></div>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderDayBars(container, records) {
      if (!records.length) {
        container.innerHTML = '<div style="color:var(--text-muted); font-size:14px; padding:20px; text-align:center;">当前过滤条件下没有数据。</div>';
        return;
      }
      
      const maxIncrease = Math.max(...records.map(r => r.increase), 1);
      const maxDecrease = Math.max(...records.map(r => r.decrease), 1);
      const globalMax = Math.max(maxIncrease, maxDecrease);

      const html = `
        <div class="day-chart-wrapper">
          <div class="day-trend-chart">
            ${records.map(item => {
              const upPct = (item.increase / globalMax) * 100;
              const downPct = (item.decrease / globalMax) * 100;
              const net = item.increase - item.decrease;
              return `
                <div class="day-col">
                  <div class="day-half up">
                    <div class="col-fill-up" style="height: ${upPct}%;"></div>
                  </div>
                  <div class="day-half down">
                    <div class="col-fill-down" style="height: ${downPct}%;"></div>
                  </div>
                  <div class="day-label">${escapeHtml(item.name).slice(5)}</div>
                  <div class="day-tooltip">
                    <div class="dt-date">${escapeHtml(item.name)}</div>
                    <div class="dt-stat"><span class="good">增加</span><span class="good">↑ ${formatNumber(item.increase)}</span></div>
                    <div class="dt-stat"><span class="bad">减少</span><span class="bad">↓ ${formatNumber(item.decrease)}</span></div>
                    <div class="dt-stat" style="margin-top: 4px; border-top: 1px solid rgba(0,0,0,0.06); padding-top: 4px;">
                      <span>净变化</span><strong class="${net > 0 ? 'good' : net < 0 ? 'bad' : ''}">${net > 0 ? '+' : ''}${formatNumber(net)}</strong>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
      container.innerHTML = html;
    }

    function renderBars(rows) {
      const itemStats = summarizeBy(rows, row => row.ItemName)
        .sort((a, b) => (b.increase + b.decrease) - (a.increase + a.decrease))
        .slice(0, 12);

      const dayStats = summarizeBy(rows, row => row.dtEventTime.slice(0, 10))
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

      const reasonStats = summarizeBy(rows, row => row.ReasonName || "未注明")
        .sort((a, b) => (b.increase + b.decrease) - (a.increase + a.decrease))
        .slice(0, 12);

      renderBarGroup(els.itemBars, itemStats);
      renderDayBars(els.dayBars, dayStats);
      renderBarGroup(els.reasonBars, reasonStats);
    }

    els.loadDefaultBtn.addEventListener("click", loadDefaultFile);
    els.fileInput.addEventListener("change", async event => {
      const [file] = event.target.files || [];
      if (!file) return;
      setStatus("正在读取你选择的文件：" + file.name);
      const text = await file.text();
      try {
        const data = JSON.parse(text);
        hydrateData(data, "已加载文件 " + file.name);
      } catch (e) {
        setStatus("文件格式错误，无法解析 JSON。");
      }
    });

    els.applyBtn.addEventListener("click", () => {
      populateFilterOptions();
      applyFilters();
    });

    els.itemSelect.addEventListener("change", () => {
      state.selectedItems = els.itemSelect.value ? [els.itemSelect.value] : [];
      applyFilters();
    });

    els.itemCardGrid.addEventListener("click", event => {
      const button = event.target.closest(".item-card");
      if (!button) return;
      const item = button.dataset.item || "";
      if (!item) {
        state.selectedItems = [];
        els.itemSelect.value = "";
        applyFilters();
        return;
      }

      const selectedItems = new Set(state.selectedItems);
      if (selectedItems.has(item)) {
        selectedItems.delete(item);
      } else {
        selectedItems.add(item);
      }

      state.selectedItems = [...selectedItems];
      els.itemSelect.value = state.selectedItems.length === 1 ? state.selectedItems[0] : "";
      applyFilters();
    });

    els.presetBtn.addEventListener("click", () => {
      resetPreset();
      populateFilterOptions();
      applyFilters();
    });

    document.getElementById("filterBallsBtn").addEventListener("click", () => {
      resetPreset();
      els.keywordInput.value = "球";
      populateFilterOptions();
      applyFilters();
    });

    els.keywordInput.addEventListener("input", populateFilterOptions);

    resetPreset();
    loadDefaultFile();
  </script>
</body>

</html>
