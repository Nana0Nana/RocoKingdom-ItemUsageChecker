<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>流水筛选可视化</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --panel: #fffaf0;
      --panel-strong: #fffdf8;
      --text: #2f2419;
      --muted: #7a6a57;
      --line: #dccdb8;
      --accent: #b3562f;
      --accent-light: rgba(179, 86, 47, 0.15);
      --accent-2: #26706f;
      --good: #2b8a57;
      --bad: #c4513d;
      --shadow: 0 8px 24px rgba(67, 41, 12, 0.05), 0 2px 8px rgba(67, 41, 12, 0.03);
      --shadow-hover: 0 12px 32px rgba(67, 41, 12, 0.08), 0 4px 12px rgba(67, 41, 12, 0.04);
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --anim: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(179, 86, 47, 0.08), transparent 30%),
        radial-gradient(circle at top right, rgba(38, 112, 111, 0.06), transparent 30%),
        linear-gradient(180deg, #f7f3ec 0%, #f2ede4 100%);
      line-height: 1.5;
    }

    .wrap {
      width: min(1380px, calc(100% - 32px));
      margin: 24px auto 40px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid rgba(220, 205, 184, 0.6);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      transition: box-shadow var(--anim);
    }

    .hero {
      padding: 32px;
      margin-bottom: 24px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(255, 248, 239, 0.98)),
        linear-gradient(135deg, rgba(179, 86, 47, 0.06), rgba(38, 112, 111, 0.05));
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: -0.01em;
      font-weight: 800;
      color: #241b12;
    }

    .sub {
      color: var(--muted);
      margin: 0;
      font-size: 15px;
      font-weight: 500;
    }

    .layout,
    .sidebar,
    .content {
      display: grid;
      gap: 20px;
      align-content: start;
    }

    .layout {
      grid-template-columns: 1fr;
    }

    .panel {
      padding: 24px;
    }
    .panel:hover {
      box-shadow: var(--shadow-hover);
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid.two {
      grid-template-columns: 1fr 1fr;
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    input,
    select,
    button {
      font: inherit;
      outline: none;
    }

    input[type="text"],
    input[type="datetime-local"],
    select {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      transition: all var(--anim);
      box-shadow: inset 0 2px 4px rgba(67, 41, 12, 0.02);
    }
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions.tight {
      gap: 8px;
    }

    button,
    .file-button {
      border: 0;
      border-radius: 999px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--anim);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover,
    .file-button:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 10px rgba(179, 86, 47, 0.25);
    }
    .primary:hover {
      background: #9c4826;
      box-shadow: 0 6px 14px rgba(179, 86, 47, 0.35);
    }

    .secondary {
      background: #efe4d2;
      color: var(--text);
      box-shadow: 0 2px 6px rgba(67, 41, 12, 0.05);
    }
    .secondary:hover {
      background: #e6d8c3;
      box-shadow: 0 4px 10px rgba(67, 41, 12, 0.08);
    }

    .file-button {
      background: var(--accent-2);
      color: #fff;
      box-shadow: 0 4px 10px rgba(38, 112, 111, 0.25);
    }
    .file-button:hover {
      background: #1f5c5b;
      box-shadow: 0 6px 14px rgba(38, 112, 111, 0.35);
    }

    input[type="file"] {
      display: none;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
      padding-top: 8px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(250, 243, 232, 0.98));
      border: 1px solid rgba(220, 205, 184, 0.6);
      border-radius: var(--radius-md);
      padding: 20px;
      box-shadow: 0 2px 8px rgba(67, 41, 12, 0.03);
      transition: transform var(--anim), box-shadow var(--anim);
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(67, 41, 12, 0.06);
    }

    .card .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .card .value {
      font-size: clamp(24px, 3.5vw, 36px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .good {
      color: var(--good);
    }

    .bad {
      color: var(--bad);
    }

    .chart-title {
      margin: 0 0 16px;
      font-size: 16px;
      font-weight: 700;
    }

    .bars {
      display: grid;
      gap: 16px;
    }

    .bar-row {
      display: grid;
      gap: 8px;
    }

    .bar-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.4);
      padding: 6px 12px;
      border-radius: 8px;
    }

    .track {
      height: 12px;
      border-radius: 999px;
      background: rgba(67, 41, 12, 0.06);
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(67, 41, 12, 0.05);
    }

    .fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), #d38b53);
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .fill.alt {
      background: linear-gradient(90deg, var(--accent-2), #55a6a3);
    }

    .fill.good {
      background: linear-gradient(90deg, #2b8a57, #63b97d);
    }

    .fill.bad {
      background: linear-gradient(90deg, #c4513d, #dd8a6f);
    }

    .bar-pair {
      display: grid;
      gap: 8px;
    }

    .track-row {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .track-label {
      font-weight: 700;
      color: var(--text);
    }

    .track-value {
      text-align: right;
      white-space: nowrap;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid rgba(220, 205, 184, 0.6);
      border-radius: var(--radius-md);
      background: rgba(255, 253, 248, 0.9);
      box-shadow: 0 4px 12px rgba(67, 41, 12, 0.02);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 880px;
    }

    th,
    td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(220, 205, 184, 0.4);
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(251, 245, 234, 0.95);
      backdrop-filter: blur(4px);
      z-index: 1;
      font-weight: 700;
      color: var(--muted);
      font-size: 13px;
    }

    tr:hover td {
      background: rgba(179, 86, 47, 0.03);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #efe4d2;
      color: var(--text);
    }

    .pill.good {
      background: rgba(43, 138, 87, 0.12);
      color: var(--good);
    }

    .pill.bad {
      background: rgba(196, 81, 61, 0.12);
      color: var(--bad);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .item-card-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      max-height: 480px;
      overflow-y: auto;
      padding-right: 6px;
    }

    .item-card-grid::-webkit-scrollbar { width: 6px; }
    .item-card-grid::-webkit-scrollbar-track { background: transparent; }
    .item-card-grid::-webkit-scrollbar-thumb { background: rgba(122, 106, 87, 0.2); border-radius: 4px; }
    .item-card-grid::-webkit-scrollbar-thumb:hover { background: rgba(122, 106, 87, 0.4); }

    .item-card {
      text-align: left;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(220, 205, 184, 0.6);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(246, 235, 220, 0.98));
      color: var(--text);
      box-shadow: 0 2px 6px rgba(67, 41, 12, 0.02);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      transition: all var(--anim);
    }

    .item-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(67, 41, 12, 0.06);
      border-color: var(--accent-light);
    }

    .item-card.active {
      background: linear-gradient(180deg, rgba(179, 86, 47, 0.96), rgba(151, 64, 29, 0.98));
      color: #fff7f2;
      border-color: rgba(179, 86, 47, 0.95);
      box-shadow: 0 6px 16px rgba(179, 86, 47, 0.25);
    }

    .item-card .title {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .item-card .desc {
      display: block;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .item-card .meta {
      display: block;
      font-size: 12px;
      opacity: 0.85;
      text-align: right;
      min-width: 84px;
      font-weight: 600;
    }

    .item-card-copy {
      min-width: 0;
    }

    .item-card.active .desc {
      color: rgba(255, 247, 242, 0.86);
    }

    .stack {
      display: grid;
      gap: 20px;
    }

    .section-line {
      height: 1px;
      background: linear-gradient(90deg, rgba(220, 205, 184, 0), rgba(220, 205, 184, 0.8), rgba(220, 205, 184, 0));
      margin: 4px 0;
    }

    .toolbar {
      display: grid;
      gap: 20px;
      margin-bottom: 24px;
    }

    .filter-block {
      display: grid;
      gap: 16px;
      padding: 16px 20px;
      border: 1px solid rgba(220, 205, 184, 0.5);
      border-radius: var(--radius-md);
      background: rgba(255, 253, 248, 0.6);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.5);
    }

    .filter-block h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      color: #7a6a57;
    }

    @media (max-width: 1120px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .item-card-grid,
      .grid.three {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 24px, 1380px);
        margin-top: 16px;
      }

      .hero,
      .panel {
        border-radius: var(--radius-md);
        padding: 20px;
      }

      .item-card-grid,
      .grid.three,
      .grid.two,
      .cards {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <h1>流水筛选可视化</h1>
      <p class="sub">查看固定时间段、固定道具种类、增减类型和原因过滤，并把结果用汇总卡片、排行榜和明细表展示出来。</p>
    </section>

    <div class="toolbar">
      <section class="panel">
        <h2>汇总概览</h2>
        <div class="cards">
          <article class="card">
            <div class="label">符合条件记录数</div>
            <div id="totalRows" class="value">0</div>
          </article>
          <article class="card">
            <div class="label">总增加</div>
            <div id="totalIncrease" class="value good">0</div>
          </article>
          <article class="card">
            <div class="label">总减少</div>
            <div id="totalDecrease" class="value bad">0</div>
          </article>
          <article class="card">
            <div class="label">净变化</div>
            <div id="netChange" class="value">0</div>
          </article>
        </div>
      </section>
    </div>

    <div class="layout">
      <aside class="sidebar">
        <section class="panel">
          <h2>数据源</h2>
          <div class="actions tight">
            <button id="loadDefaultBtn" class="primary" type="button">加载同目录 JSON</button>
            <label class="file-button" for="fileInput">手动选择 JSON</label>
            <input id="fileInput" type="file" accept=".json,application/json">
          </div>
          <p id="status" class="status">等待加载数据。</p>
          <p class="hint">如果直接双击打开 HTML，浏览器可能不允许自动读取同目录文件。这时点“手动选择 JSON”即可。</p>
        </section>

        <section class="panel">
          <h2>过滤条件</h2>
          <div class="stack">
            <div class="grid three">
              <div class="filter-block">
                <h3>时间范围</h3>
                <div class="grid two">
                  <label>
                    开始时间
                    <input id="startTime" type="datetime-local" value="2026-04-16T00:00">
                  </label>
                  <label>
                    结束时间
                    <input id="endTime" type="datetime-local" value="2026-04-19T23:59">
                  </label>
                </div>
              </div>

              <div class="filter-block">
                <h3>名称过滤</h3>
                <label>
                  道具名称关键词
                  <input id="keywordInput" type="text" value="球" placeholder="例如：球 / 高级咕噜球 / 调温球">
                </label>
              </div>

              <div class="filter-block">
                <h3>附加筛选</h3>
                <div class="grid two">
                  <label>
                    增减类型
                    <select id="actionSelect">
                      <option value="">全部</option>
                      <option value="增加">只看增加</option>
                      <option value="减少">只看减少</option>
                    </select>
                  </label>
                  <label>
                    原因
                    <select id="reasonSelect">
                      <option value="">全部</option>
                    </select>
                  </label>
                </div>
              </div>
            </div>

            <div class="section-line"></div>

            <div class="filter-block">
              <h3>球种卡片选择</h3>
              <label>
                精确道具
                <select id="itemSelect">
                  <option value="">全部匹配道具</option>
                </select>
              </label>
              <div id="itemCardGrid" class="item-card-grid"></div>
              <p class="hint">点击卡片后会同步到“精确道具”筛选；再点一次当前卡片可取消选择。</p>
            </div>

            <div class="section-line"></div>

            <div class="actions">
              <button id="applyBtn" class="primary" type="button">应用</button>
              <button id="presetBtn" class="secondary" type="button">重置</button>
            </div>
          </div>
        </section>
      </aside>

      <main class="content">
        <section class="panel">
          <h2 class="chart-title">按球种汇总</h2>
          <div id="itemBars" class="bars"></div>
        </section>

        <section class="panel">
          <h2 class="chart-title">按日期汇总</h2>
          <div id="dayBars" class="bars"></div>
        </section>

        <section class="panel">
          <h2 class="chart-title">按原因汇总</h2>
          <div id="reasonBars" class="bars"></div>
        </section>

      </main>
    </div>
  </div>

  <script>
    const state = {
      rows: [],
      filtered: [],
      selectedItems: [],
    };

    const AUTO_LOAD_INTERVAL_MS = 3000;
    let autoLoadTimer = null;

    const BALL_INFO = {
      "普通咕噜球": "最普通的咕噜球，基础捕捉球。",
      "高级咕噜球": "常用的进阶捕捉球，捕捉概率更高。",
      "可可果球": "活动获取的特殊球，描述中强调捕捉概率较高。",
      "爱茉咕噜球": "只能在花神和传说挑战中使用的特殊球。",
      "美妙球": "更适合草系、普通系精灵的捕捉。",
      "调温球": "更适合冰系、火系精灵的捕捉。",
      "变幻球": "更适合水系、机械系精灵的捕捉。",
      "冰凌球": "更适合风系、天使明的精灵捕捉。",
      "光合球": "更适合草系、光系精灵的捕捉。",
      "沙沙球": "更适合地系、虫系精灵的捕捉。",
      "好战球": "更适合龙系、武系精灵的捕捉。",
      "幽梦球": "更适合暗系、超系精灵的捕捉。",
      "网兜球": "更适合水系、飞系精灵的捕捉。",
      "绝缘球": "更适合电系、地系精灵的捕捉。",
      "水球球": "在雨天使用时会额外提高捕捉率。",
      "捕光球": "赛季限定咕噜球，强调 100% 捕捉精灵。",
      "国王球": "强调 100% 捕捉精灵，但携带后不能天胶。",
      "棱镜球": "强调 100% 捕捉精灵，描述中提到需先为天球。",
      "织梦绽颜球": "赛季限定咕噜球，描述中强调可焕化为限定校彩。",
    };

    const els = {
      loadDefaultBtn: document.getElementById("loadDefaultBtn"),
      fileInput: document.getElementById("fileInput"),
      applyBtn: document.getElementById("applyBtn"),
      presetBtn: document.getElementById("presetBtn"),
      status: document.getElementById("status"),
      startTime: document.getElementById("startTime"),
      endTime: document.getElementById("endTime"),
      keywordInput: document.getElementById("keywordInput"),
      itemSelect: document.getElementById("itemSelect"),
      actionSelect: document.getElementById("actionSelect"),
      reasonSelect: document.getElementById("reasonSelect"),
      itemCardGrid: document.getElementById("itemCardGrid"),
      totalRows: document.getElementById("totalRows"),
      totalIncrease: document.getElementById("totalIncrease"),
      totalDecrease: document.getElementById("totalDecrease"),
      netChange: document.getElementById("netChange"),
      itemBars: document.getElementById("itemBars"),
      dayBars: document.getElementById("dayBars"),
      reasonBars: document.getElementById("reasonBars"),
    };

    function setStatus(text) {
      els.status.textContent = text;
    }

    function parseCount(value) {
      const num = Number.parseInt(String(value ?? "").trim(), 10);
      return Number.isFinite(num) ? num : 0;
    }

    function parseDateTime(value) {
      return new Date(value.replace(" ", "T"));
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("zh-CN").format(value);
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getBallDescription(name) {
      return BALL_INFO[name] || "点击筛选查看该球在所选时间范围内的增加、减少和净变化。";
    }

    function resetPreset() {
      els.startTime.value = "2026-04-16T00:00";
      els.endTime.value = "2026-04-19T23:59";
      els.keywordInput.value = "球";
      els.actionSelect.value = "";
      els.reasonSelect.value = "";
      els.itemSelect.value = "";
      state.selectedItems = [];
    }

    function normalizeRows(rows) {
      return rows
        .filter(row => row && row.dtEventTime && row.ItemName)
        .map(row => ({
          ...row,
          _time: parseDateTime(row.dtEventTime),
          _count: parseCount(row.iCount),
          _after: parseCount(row.AfterCount),
        }))
        .sort((a, b) => b._time - a._time);
    }

    function stopAutoLoadRetry() {
      if (autoLoadTimer !== null) {
        clearTimeout(autoLoadTimer);
        autoLoadTimer = null;
      }
    }

    function scheduleAutoLoadRetry() {
      if (autoLoadTimer !== null || state.rows.length) {
        return;
      }
      autoLoadTimer = window.setTimeout(() => {
        autoLoadTimer = null;
        loadDefaultFile(true);
      }, AUTO_LOAD_INTERVAL_MS);
    }

    async function loadDefaultFile(silentRetry = false) {
      if (!silentRetry) {
        setStatus("正在尝试读取同目录 full_list.json ...");
      }
      try {
        const response = await fetch("./full_list.json?ts=" + Date.now());
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const data = await response.json();
        hydrateData(data, "已加载同目录 full_list.json");
      } catch (error) {
        setStatus("自动读取失败，请改用“手动选择 JSON”。原因：" + error.message);
        scheduleAutoLoadRetry();
      }
    }

    function hydrateData(data, message) {
      const rows = Array.isArray(data) ? data : data.rows;
      state.rows = normalizeRows(Array.isArray(rows) ? rows : []);
      stopAutoLoadRetry();
      populateFilterOptions();
      applyFilters();
      setStatus(message + "，共 " + formatNumber(state.rows.length) + " 条记录。");
    }

    function populateFilterOptions() {
      const keyword = els.keywordInput.value.trim();
      const itemNames = [...new Set(
        state.rows
          .map(row => row.ItemName)
          .filter(name => !keyword || name.includes(keyword))
      )].sort((a, b) => a.localeCompare(b, "zh-CN"));

      const reasons = [...new Set(state.rows.map(row => row.ReasonName || "未注明"))]
        .sort((a, b) => a.localeCompare(b, "zh-CN"));

      const itemCounts = new Map();
      for (const row of state.rows) {
        if (!itemNames.includes(row.ItemName)) continue;
        itemCounts.set(row.ItemName, (itemCounts.get(row.ItemName) || 0) + 1);
      }

      state.selectedItems = state.selectedItems.filter(name => itemNames.includes(name));
      const currentItem = state.selectedItems.length === 1 ? state.selectedItems[0] : "";
      els.itemSelect.innerHTML = '<option value="">全部匹配道具</option>' +
        itemNames.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
      els.itemSelect.value = currentItem;

      renderItemCards(itemNames, itemCounts);

      const currentReason = els.reasonSelect.value;
      els.reasonSelect.innerHTML = '<option value="">全部</option>' +
        reasons.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
      if (reasons.includes(currentReason)) {
        els.reasonSelect.value = currentReason;
      }
    }

    function applyFilters() {
      const start = els.startTime.value ? new Date(els.startTime.value) : null;
      const end = els.endTime.value ? new Date(els.endTime.value) : null;
      const keyword = els.keywordInput.value.trim();
      const selectedItems = new Set(state.selectedItems);
      const action = els.actionSelect.value;
      const reason = els.reasonSelect.value;

      state.filtered = state.rows.filter(row => {
        if (start && row._time < start) return false;
        if (end && row._time > end) return false;
        if (keyword && !row.ItemName.includes(keyword)) return false;
        if (selectedItems.size && !selectedItems.has(row.ItemName)) return false;
        if (action && row.AddOrReduce !== action) return false;
        if (reason && (row.ReasonName || "未注明") !== reason) return false;
        return true;
      });

      renderSummary(state.filtered);
      renderBars(state.filtered);
      syncItemCardActiveState();
    }

    function renderItemCards(itemNames, itemCounts) {
      const selectedItems = new Set(state.selectedItems);
      const cards = [
        `
          <button class="item-card ${selectedItems.size ? "" : "active"}" type="button" data-item="">
            <span class="item-card-copy">
              <span class="title">全部匹配道具</span>
              <span class="desc">同时查看当前关键词下所有球种的增减变化，适合先看整体再细分。</span>
            </span>
            <span class="meta">${formatNumber(itemNames.length)} 种球${selectedItems.size ? " · 点击清空选择" : ""}</span>
          </button>
        `,
        ...itemNames.map(name => `
          <button class="item-card ${selectedItems.has(name) ? "active" : ""}" type="button" data-item="${escapeHtml(name)}">
            <span class="item-card-copy">
              <span class="title">${escapeHtml(name)}</span>
              <span class="desc">${escapeHtml(getBallDescription(name))}</span>
            </span>
            <span class="meta">${formatNumber(itemCounts.get(name) || 0)} 条记录</span>
          </button>
        `)
      ];
      els.itemCardGrid.innerHTML = cards.join("");
    }

    function syncItemCardActiveState() {
      const selectedItems = new Set(state.selectedItems);
      for (const card of els.itemCardGrid.querySelectorAll(".item-card")) {
        const item = card.dataset.item || "";
        const active = item ? selectedItems.has(item) : selectedItems.size === 0;
        card.classList.toggle("active", active);
      }
    }

    function renderSummary(rows) {
      const increase = rows
        .filter(row => row.AddOrReduce === "增加")
        .reduce((sum, row) => sum + row._count, 0);
      const decrease = rows
        .filter(row => row.AddOrReduce === "减少")
        .reduce((sum, row) => sum + row._count, 0);
      const net = increase - decrease;

      els.totalRows.textContent = formatNumber(rows.length);
      els.totalIncrease.textContent = formatNumber(increase);
      els.totalDecrease.textContent = formatNumber(decrease);
      els.netChange.textContent = (net > 0 ? "+" : "") + formatNumber(net);
      els.netChange.className = "value " + (net > 0 ? "good" : net < 0 ? "bad" : "");
    }

    function summarizeBy(rows, keyFn) {
      const map = new Map();
      for (const row of rows) {
        const key = keyFn(row);
        const entry = map.get(key) || { name: key, increase: 0, decrease: 0, rows: 0 };
        entry.rows += 1;
        if (row.AddOrReduce === "增加") entry.increase += row._count;
        if (row.AddOrReduce === "减少") entry.decrease += row._count;
        map.set(key, entry);
      }
      return [...map.values()];
    }

    function renderBarGroup(container, records, colorClass = "alt") {
      if (!records.length) {
        container.innerHTML = '<div class="hint">当前过滤条件下没有数据。</div>';
        return;
      }

      const maxIncrease = Math.max(...records.map(item => item.increase), 1);
      const maxDecrease = Math.max(...records.map(item => item.decrease), 1);
      container.innerHTML = records.map(item => {
        const increaseWidth = (item.increase / maxIncrease) * 100;
        const decreaseWidth = (item.decrease / maxDecrease) * 100;
        const net = item.increase - item.decrease;
        return `
          <div class="bar-row">
            <div class="bar-meta">
              <strong>${escapeHtml(item.name)}</strong>
              <span>增加 ${formatNumber(item.increase)} / 减少 ${formatNumber(item.decrease)} / 净 ${net > 0 ? "+" : ""}${formatNumber(net)}</span>
            </div>
            <div class="bar-pair">
              <div class="track-row">
                <span class="track-label">增加</span>
                <div class="track">
                  <div class="fill ${colorClass === "alt" ? "alt" : "good"}" style="width:${increaseWidth}%"></div>
                </div>
                <span class="track-value">${formatNumber(item.increase)}</span>
              </div>
              <div class="track-row">
                <span class="track-label">减少</span>
                <div class="track">
                  <div class="fill bad" style="width:${decreaseWidth}%"></div>
                </div>
                <span class="track-value">${formatNumber(item.decrease)}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderBars(rows) {
      const itemStats = summarizeBy(rows, row => row.ItemName)
        .sort((a, b) => (b.increase + b.decrease) - (a.increase + a.decrease))
        .slice(0, 12);

      const dayStats = summarizeBy(rows, row => row.dtEventTime.slice(0, 10))
        .sort((a, b) => a.name.localeCompare(b.name, "zh-CN"));

      const reasonStats = summarizeBy(rows, row => row.ReasonName || "未注明")
        .sort((a, b) => (b.increase + b.decrease) - (a.increase + a.decrease))
        .slice(0, 12);

      renderBarGroup(els.itemBars, itemStats, "");
      renderBarGroup(els.dayBars, dayStats, "alt");
      renderBarGroup(els.reasonBars, reasonStats, "");
    }

    els.loadDefaultBtn.addEventListener("click", loadDefaultFile);
    els.fileInput.addEventListener("change", async event => {
      const [file] = event.target.files || [];
      if (!file) return;
      setStatus("正在读取你选择的文件：" + file.name);
      const text = await file.text();
      const data = JSON.parse(text);
      hydrateData(data, "已加载文件 " + file.name);
    });

    els.applyBtn.addEventListener("click", () => {
      populateFilterOptions();
      applyFilters();
    });

    els.itemSelect.addEventListener("change", () => {
      state.selectedItems = els.itemSelect.value ? [els.itemSelect.value] : [];
      applyFilters();
    });

    els.itemCardGrid.addEventListener("click", event => {
      const button = event.target.closest(".item-card");
      if (!button) return;
      const item = button.dataset.item || "";
      if (!item) {
        state.selectedItems = [];
        els.itemSelect.value = "";
        applyFilters();
        return;
      }

      const selectedItems = new Set(state.selectedItems);
      if (selectedItems.has(item)) {
        selectedItems.delete(item);
      } else {
        selectedItems.add(item);
      }

      state.selectedItems = [...selectedItems];
      els.itemSelect.value = state.selectedItems.length === 1 ? state.selectedItems[0] : "";
      applyFilters();
    });

    els.presetBtn.addEventListener("click", () => {
      resetPreset();
      populateFilterOptions();
      applyFilters();
    });

    els.keywordInput.addEventListener("input", populateFilterOptions);

    resetPreset();
    loadDefaultFile();
  </script>
</body>

</html>
